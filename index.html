<body>

<main>

    <h1>Hibi 🪴 </h1>

    <section>
    <h3>Mood</h3>

    <button class="mood-button" data-mood="🥱">🥱</button>
    <button class="mood-button" data-mood="😢">😢</button>

    </section>

    <section>
        <h3>Chats 🐱</h3>

        <label><input type="checkbox" id="nourriture"> Eau / nourriture</label>
        <label><input type="checkbox" id="litiere"> Litière</label>
    </section>

    <section>
        <p>Moi : <span id="score-moi">0</span>/<span id="total-moi">0</span></p>
        <p>Chats : <span id="score-chats">0</span>/<span id="total-chats">0</span></p>
    </section>

    <section>
    <h3>Derniers jours</h3>
